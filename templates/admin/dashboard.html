{% extends "base.html" %}
{% block content %}
<h1>Admin Dashboard</h1>
<a href="{{ url_for('add_news') }}" class="btn btn-success mb-3">+ Add News</a>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for news in news_list %}
        <tr>
            <td>{{ news.title }}</td>
            <td>{{ news.date_posted.strftime('%Y-%m-%d') }}</td>
            <td>
                <a href="{{ url_for('edit_news', news_id=news.id) }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{{ url_for('delete_news', news_id=news.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this item?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
