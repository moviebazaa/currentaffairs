{% extends "base.html" %}
{% block content %}
<h2>Add News Article</h2>
<form method="POST">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" name="title" id="title" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="summary" class="form-label">Summary</label>
        <textarea name="summary" id="summary" class="form-control" rows="3" required></textarea>
    </div>
    <div class="mb-3">
        <label for="content" class="form-label">Content (HTML allowed)</label>
        <textarea name="content" id="content" class="form-control" rows="10" required></textarea>
    </div>
    <div class="mb-3">
        <label for="image_url" class="form-label">Image URL (optional)</label>
        <input type="text" name="image_url" id="image_url" class="form-control" placeholder="https://example.com/image.jpg">
    </div>
    <button type="submit" class="btn btn-primary">Save Article</button>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
