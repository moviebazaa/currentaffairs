{% extends "base.html" %}
{% block content %}
<h2>Edit News Article</h2>
<form method="POST">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" name="title" id="title" class="form-control" value="{{ news.title }}" required>
    </div>
    <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select name="category" id="category" class="form-select" required>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if news.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="summary" class="form-label">Summary</label>
        <textarea name="summary" id="summary" class="form-control" rows="3" required>{{ news.summary }}</textarea>
    </div>
    <div class="mb-3">
        <label for="content" class="form-label">Content (HTML allowed)</label>
        <textarea name="content" id="content" class="form-control" rows="10" required>{{ news.content }}</textarea>
    </div>
    <div class="mb-3">
        <label for="image_url" class="form-label">Image URL (optional)</label>
        <input type="text" name="image_url" id="image_url" class="form-control" value="{{ news.image_url or '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Update Article</button>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
