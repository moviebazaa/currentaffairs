{% extends "base.html" %}
{% block content %}
<article>
    <h1>{{ news.title }}</h1>
    <p class="text-muted">{{ news.date_posted.strftime('%B %d, %Y') }}</p>
    {% if news.image_url %}
    <img src="{{ news.image_url }}" class="img-fluid mb-3" alt="{{ news.title }}">
    {% endif %}
    <div class="mt-3">{{ news.content | safe }}</div>
    <a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">← Back to News</a>
</article>
{% endblock %}
